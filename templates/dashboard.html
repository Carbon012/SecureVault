{% extends "base.html" %}
{% block content %}

<div class="container">

    <div class="user-info">
        <div>
            <h3>User Dashboard</h3>
            <p>Logged in as: <strong>{{ current_user.username }}</strong></p>
        </div>

        <a class="logout-btn" href="{{ url_for('auth.logout') }}">Logout</a>
    </div>

    <hr>

    <h4>Add Secure Note</h4>

    <form method="POST">
        <input type="text" name="secret_text" placeholder="Enter sensitive data..." required>
        <button type="submit">Encrypt & Save</button>
    </form>

    <h4>Your Decrypted Notes</h4>

    {% for note in notes %}
        <div class="note-card">
            <span>{{ note.content }}</span>

            <form action="{{ url_for('user.delete_note', note_id=note.id) }}" method="POST">
                <button type="submit">Delete</button>
            </form>
        </div>
    {% else %}
        <p>No secure notes found.</p>
    {% endfor %}

</div>

{% endblock %}
